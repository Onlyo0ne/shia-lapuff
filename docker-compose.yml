version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shialapuff-db
    environment:
      POSTGRES_DB: shialapuff
      POSTGRES_USER: shialapuff
      POSTGRES_PASSWORD: shialapuff
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shialapuff"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shialapuff-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shialapuff
      SPRING_DATASOURCE_USERNAME: shialapuff
      SPRING_DATASOURCE_PASSWORD: shialapuff
      JWT_SECRET: your-secret-key-change-in-prod
    volumes:
      - ./backend:/app
      - maven_repository:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shialapuff-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080/api

volumes:
  postgres_data:
  maven_repository:
